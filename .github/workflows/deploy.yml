# .github/workflows/deploy.yml
name: deploy
on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: regwatch
          POSTGRES_USER: regwatch
          POSTGRES_PASSWORD: regwatch
        ports: ["5434:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgres://regwatch:regwatch@localhost:5434/regwatch
      DJANGO_DEBUG: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      # PYSEC-2026-2090/2091/2092: fixed in Django 5.2.16, which is not yet
      # published on PyPI (only 6.0.7 carries the fix so far); upgrading to
      # Django 6 is a major bump out of scope for this CI gate, so these are
      # ignored pending the 5.2.16 release.
      - run: uv run pip-audit --ignore-vuln PYSEC-2026-2090 --ignore-vuln PYSEC-2026-2091 --ignore-vuln PYSEC-2026-2092
      - run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - working-directory: web
        run: pnpm install --frozen-lockfile
      - working-directory: web
        run: pnpm audit --audit-level=high
      - working-directory: web
        run: pnpm run lint
      - working-directory: web
        run: pnpm test
      - working-directory: web
        run: pnpm run build

  deploy:
    needs: [test, frontend]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write            # required for Workload Identity Federation
    env:
      REGION: ${{ secrets.GCP_REGION }}
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
      - name: Build & push image
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            TAG="$(git rev-parse --short HEAD)"
          fi
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/regwatch/regwatch:${TAG}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
      - name: Deploy jobs
        run: |
          for pair in regwatch-migrate:migrate regwatch-run-daily:run_daily regwatch-heartbeat:check_heartbeat; do
            name="${pair%%:*}"; cmd="${pair##*:}"
            gcloud run jobs update "$name" --image="$IMAGE" --region="$REGION" --args="$cmd"
          done
      - name: Run migrations
        run: gcloud run jobs execute regwatch-migrate --region="$REGION" --wait
      - name: Deploy service
        run: gcloud run services update regwatch-api --image="$IMAGE" --region="$REGION"
